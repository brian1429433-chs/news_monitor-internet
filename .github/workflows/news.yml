name: 高雄新聞監控

on:
  # 每 5 分鐘觸發一次（cron 使用 UTC；此設定不受時區影響）
  # 注意：GitHub 尖峰時可能延遲數分鐘，屬正常現象。
  schedule:
    - cron: "*/5 * * * *"
  # 保留手動觸發按鈕，方便測試
  workflow_dispatch:

# 允許 workflow 把更新後的去重檔 commit 回 repo
permissions:
  contents: write

# 避免兩次排程重疊互相覆蓋狀態檔
concurrency:
  group: news-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 安裝 Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: 執行新聞監控
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: python news_monitor.py

      - name: 保存去重狀態（有變更才 commit）
        run: |
          if [[ -n "$(git status --porcelain sent_news_ids.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sent_news_ids.json
            git commit -m "chore: update sent_news_ids [skip ci]"
            git push
          else
            echo "去重檔無變更，略過 commit。"
          fi
